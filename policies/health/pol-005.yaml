id: POL-005
name: Required Health Checks
category: health
severity: high
mode: enforce
description: Asserts that workloads include health probes.
why_it_matters: Without proper Liveness and Readiness probes, traffic might be routed to unresponsive instances.
applies_to:
  - terraform
  - kubernetes
  - dockerfile
rules:
  - require_probes: true
remediation: Configure readinessProbe and livenessProbe for K8s, or HEALTHCHECK for Dockerfiles.
