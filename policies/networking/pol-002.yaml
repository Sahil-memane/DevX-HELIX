id: POL-002
name: No Public Endpoints
category: networking
severity: critical
mode: enforce
description: Prevents exposing internal services directly to the public internet without proper ingress controls.
why_it_matters: Publicly exposed resources are common vectors for initial access and DDoS attacks.
applies_to:
  - terraform
  - kubernetes
rules:
  - disallow_public_ip: true
remediation: Use internal load balancers, private IPs, and route external traffic through a secure API Gateway/Ingress.
