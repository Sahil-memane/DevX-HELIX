id: POL-008
name: Block Sensitive Ports Default Exposure
category: networking
severity: high
mode: enforce
description: Restricts the usage of known sensitive administrative and database ports from generic exposure.
why_it_matters: Default ports for SSH and Databases are heavily scanned by automated bots; obfuscating/blocking them reduces attack surface.
applies_to:
  - kubernetes
  - dockerfile
rules:
  - blocked_ports:
      - 22
      - 3389
      - 5432
      - 6379
      - 27017
remediation: Ensure administrative interfaces use internal IPs or VPNs. Avoid exposing ports 22, 3389, 5432, 6379, etc., publicly.
