id: POL-004
name: Default CPU/Memory Limits
category: resources
severity: medium
mode: audit
description: Ensures that CPU and memory limits are explicitly set for containers.
why_it_matters: Missing resource limits can lead to noisy neighbor problems or node exhaustion causing cluster instability.
applies_to:
  - terraform
  - kubernetes
rules:
  - check_limits: true
remediation: Specify 'resources.limits.cpu' and 'resources.limits.memory' constraints.
