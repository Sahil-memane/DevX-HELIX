id: POL-006
name: Minimum Replica Count
category: resources
severity: medium
mode: enforce
description: Ensures highly available configurations by enforcing minimum replicas.
why_it_matters: Applications with a single instance lack redundancy and face downtime during crashes or node failures.
applies_to:
  - kubernetes
rules:
  - minimum: 2
remediation: Increase the 'replicas' spec setting to at least 2 in deployments.
