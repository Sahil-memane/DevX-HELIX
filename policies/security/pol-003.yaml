id: POL-003
name: Approved Image Registries
category: security
severity: high
mode: enforce
description: Restricts the usage of container images to vetted internal registries.
why_it_matters: Pulling images from untrusted sources introduces supply chain risks, malware, and unpatched vulnerabilities.
applies_to:
  - terraform
  - kubernetes
  - dockerfile
rules:
  - approved_registries:
      - "docker.io/mycompany"
      - "gcr.io/policy-cluster"
remediation: Change the image source to an approved repository like 'gcr.io/policy-cluster'.
