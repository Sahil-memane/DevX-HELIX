id: POL-007
name: Block Hardcoded Secrets in Environment
category: security
severity: critical
mode: enforce
description: Detects plain-text or base64-encoded secrets injected directly as environment variables.
why_it_matters: Storing secrets in cleartext enables lateral movement if configurations are compromised.
applies_to:
  - kubernetes
  - dockerfile
rules:
  - suspicious_patterns:
      - password
      - secret
      - token
      - key
      - apikey
      - api_key
  - base64_pattern: "^[A-Za-z0-9+/]{20,}={0,2}$"
remediation: Use a Secrets Manager and inject values securely using K8s secretKeyRef or a Vault integration instead.
