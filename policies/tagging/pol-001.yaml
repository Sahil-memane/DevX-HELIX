id: POL-001
name: Mandatory Resource Tags
category: governance
severity: high
mode: enforce
description: Ensures all applicable infrastructure resources have mandatory tags.
why_it_matters: Failing to tag resources makes cost tracking, ownership tracing, and environment isolation difficult.
applies_to:
  - terraform
  - kubernetes
rules:
  - required_tags:
      - env
      - team
remediation: Add the mandatory tags ('env', 'team') to the resource labels/tags definition.
